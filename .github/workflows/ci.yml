name: CI — Flutter Validation

on:
  push:
    branches: [main]
    paths:
      - 'naver_blog_image_downloader/lib/**'
      - 'naver_blog_image_downloader/test/**'
      - 'naver_blog_image_downloader/pubspec.yaml'
      - 'naver_blog_image_downloader/pubspec.lock'
      - 'naver_blog_image_downloader/analysis_options.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'naver_blog_image_downloader/lib/**'
      - 'naver_blog_image_downloader/test/**'
      - 'naver_blog_image_downloader/pubspec.yaml'
      - 'naver_blog_image_downloader/pubspec.lock'
      - 'naver_blog_image_downloader/analysis_options.yaml'
  workflow_dispatch:

jobs:
  validate:
    name: Test, Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: naver_blog_image_downloader
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Analyze
        run: flutter analyze

      - name: Format
        run: dart format .

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: 自動格式化 (dart format)"
          file_pattern: "naver_blog_image_downloader/**/*.dart"
